# Codemagic CI pipeline for the Telegram-iOS fork (Phantom proxy build).
#
# This builds a RE-SIGNABLE Telegram IPA using the in-repo self-signed
# `build-system/fake-codesigning` material (the same path used by Telegram's
# reproducible-build "verify" flow). The resulting IPA is signed with a
# throwaway self-signed certificate and is meant to be RE-SIGNED by a sideload
# tool (AltStore / SideStore / Sideloadly) with your own free 7-day Apple ID.
#
# Secrets: create a Codemagic environment variable GROUP named `telegram_api`
# with two SECURE variables:
#   TELEGRAM_API_ID    = <your api_id from my.telegram.org>
#   TELEGRAM_API_HASH  = <your api_hash from my.telegram.org>
# (They are injected into the generated build configuration; never committed.)
#
# NOTE: a cold Telegram-iOS Bazel build is very long. The bazel disk cache is
# persisted across builds (see `cache:`), so re-runs resume much faster. If the
# free tier's per-build time limit is hit, just re-run: cached actions are kept.

workflows:
  telegram-ios-ipa:
    name: Telegram iOS (Phantom) IPA
    # If `mac_mini_m2` is unavailable on your plan, try `mac_mini_m1`.
    instance_type: mac_mini_m2
    max_build_duration: 120
    environment:
      groups:
        - telegram_api
      vars:
        GOTOOLCHAIN: auto
      xcode: latest

    cache:
      cache_paths:
        - ~/telegram-bazel-cache

    scripts:
      - name: Init submodules
        script: |
          set -euxo pipefail
          git submodule update --init --recursive

      - name: Install Bazel 8.4.2 (bazelisk) + ccache
        script: |
          set -euxo pipefail
          brew install bazelisk || brew upgrade bazelisk || true
          # ccache is used by TDLib's native CMake build (third-party/td).
          brew install ccache || brew upgrade ccache || true
          echo "8.4.2" > .bazelversion
          bazelisk version || true
          ccache --version || true

      - name: Generate build configuration (api creds from env)
        script: |
          set -euo pipefail
          if [ -z "${TELEGRAM_API_ID:-}" ] || [ -z "${TELEGRAM_API_HASH:-}" ]; then
            echo "ERROR: set TELEGRAM_API_ID / TELEGRAM_API_HASH in the 'telegram_api' env group"
            exit 1
          fi
          cat > phantom-build-configuration.json <<EOF
          {
            "bundle_id": "ph.telegra.Telegraph",
            "api_id": "${TELEGRAM_API_ID}",
            "api_hash": "${TELEGRAM_API_HASH}",
            "team_id": "C67CF9S4VU",
            "app_center_id": "0",
            "is_internal_build": "true",
            "is_appstore_build": "false",
            "appstore_id": "0",
            "app_specific_url_scheme": "tgapp",
            "premium_iap_product_id": "",
            "enable_siri": false,
            "enable_icloud": false
          }
          EOF
          echo "Generated configuration (api_hash redacted):"
          sed 's/"api_hash".*/"api_hash": "<redacted>",/' phantom-build-configuration.json

      - name: Install Metal toolchain (Xcode 16+/26 no longer bundles it)
        script: |
          set -euxo pipefail
          # Telegram compiles Metal shaders (e.g. Drawing.metal). Recent Xcode
          # ships the Metal toolchain as a separately downloadable component.
          xcodebuild -downloadComponent MetalToolchain || sudo xcodebuild -downloadComponent MetalToolchain

      - name: Set up signing keychain (self-signed fake-codesigning identity)
        script: |
          set -euxo pipefail
          # Bazel signs every app extension during the build and looks up the
          # matching identity in the keychain search list. Import the in-repo
          # self-signed identity (empty p12 password, per Telegram's guest-build
          # script). The keychain search list is a persistent per-user setting,
          # so even the restricted-env ProcessAndSign genrule finds it.
          MY_KEYCHAIN="temp.keychain"
          MY_KEYCHAIN_PASSWORD="secret"
          security delete-keychain "$MY_KEYCHAIN" 2>/dev/null || true
          security create-keychain -p "$MY_KEYCHAIN_PASSWORD" "$MY_KEYCHAIN"
          security list-keychains -d user -s "$MY_KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
          security set-keychain-settings "$MY_KEYCHAIN"
          security unlock-keychain -p "$MY_KEYCHAIN_PASSWORD" "$MY_KEYCHAIN"
          CERTS_PATH="build-system/fake-codesigning/certs"
          for f in "$CERTS_PATH"/*.p12; do
            security import "$f" -k "$MY_KEYCHAIN" -P "" -A -T /usr/bin/codesign -T /usr/bin/security
          done
          for f in "$CERTS_PATH"/*.cer; do
            security import "$f" -k "$MY_KEYCHAIN" -P "" -A -T /usr/bin/codesign -T /usr/bin/security || true
          done
          security set-key-partition-list -S apple-tool:,apple: -k "$MY_KEYCHAIN_PASSWORD" "$MY_KEYCHAIN" >/dev/null
          echo "Available signing identities:"
          security find-identity -v -p codesigning "$MY_KEYCHAIN" || true

      - name: Build Phantom static xcframework (from phantom_way)
        script: |
          set -euxo pipefail
          # Build the Phantom proxy engine as a STATIC library and assemble it
          # into third-party/Phantom/Phantom.xcframework BEFORE bazel runs, so
          # //third-party/Phantom:Phantom (apple_static_xcframework_import) can
          # glob it. Static linking avoids the dynamic-framework bitcode_strip
          # that crashes on Go binaries.
          brew install go || brew upgrade go || true
          rm -rf /tmp/phantom_way
          git clone --depth 1 https://github.com/openeeer/phantom_way.git /tmp/phantom_way
          SDK="$(xcrun --sdk iphoneos --show-sdk-path)"
          CLANG="$(xcrun --sdk iphoneos -f clang)"
          (
            cd /tmp/phantom_way
            mkdir -p out/Headers
            CGO_ENABLED=1 GOOS=ios GOARCH=arm64 \
              CC="$CLANG -arch arm64 -isysroot $SDK -mios-version-min=13.0" \
              go build -buildmode=c-archive -o out/libphantom.a ./cmd/phantomcbridge
            cp out/libphantom.h out/Headers/libphantom.h
            printf 'module Phantom {\n    header "libphantom.h"\n    export *\n}\n' > out/Headers/module.modulemap
          )
          rm -rf third-party/Phantom/Phantom.xcframework
          xcodebuild -create-xcframework \
            -library /tmp/phantom_way/out/libphantom.a \
            -headers /tmp/phantom_way/out/Headers \
            -output third-party/Phantom/Phantom.xcframework
          ls -laR third-party/Phantom/Phantom.xcframework | head -40

      - name: Build re-signable IPA (fake-codesigning)
        script: |
          set -euxo pipefail
          python3 build-system/Make/Make.py \
            --cacheDir="$HOME/telegram-bazel-cache" \
            --bazel="$(which bazelisk)" \
            --overrideBazelVersion \
            --overrideXcodeVersion \
            build \
            --configurationPath=phantom-build-configuration.json \
            --codesigningInformationPath=build-system/fake-codesigning \
            --buildNumber=100001 \
            --configuration=release_arm64 \
            --outputBuildArtifactsPath=build/artifacts

    artifacts:
      - build/artifacts/Telegram.ipa
      - build/artifacts/*.zip
